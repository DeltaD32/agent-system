version: '3.8'

# =============================================================================
# AI Agent System — docker-compose
#
# Cross-platform: works on Linux (Fedora), macOS, and Windows.
# All host paths should be set in a .env file (see .env.example).
#
# GPU notes
#   Local GPU  : Ollama runs natively on the host; reachable via
#                host.docker.internal (Mac/Win) or the gateway IP on Linux.
#   Remote GPU : A second Ollama instance on your LAN.  Set OLLAMA_REMOTE_URL.
#
# Obsidian Vault
#   Set OBSIDIAN_VAULT_PATH in .env to your vault's host directory.
#   It is mounted read-write at /vault inside the orchestrator.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  ui:
    build: ./ui
    ports:
      - "3000:80"
    depends_on:
      - orchestrator
    networks:
      - frontend_net
      - backend_net
    environment:
      - REACT_APP_API_URL=/api

  # ---------------------------------------------------------------------------
  # Orchestrator (Python / Quart)
  # ---------------------------------------------------------------------------
  orchestrator:
    build: ./orchestrator
    ports:
      - "5000:5000"
    depends_on:
      message_queue:
        condition: service_healthy
      database:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net
      - ollama_net
    volumes:
      # Obsidian vault (read-write)
      # Linux/Mac: set OBSIDIAN_VAULT_PATH=/home/you/Documents/MyVault
      # Windows  : set OBSIDIAN_VAULT_PATH=C:/Users/You/Documents/MyVault
      - ${OBSIDIAN_VAULT_PATH:-./data/vault}:/vault
    environment:
      # --- Database ---
      - DB_HOST=database
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      # --- Message queue ---
      - RABBITMQ_HOST=message_queue
      - RABBITMQ_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_PASS=${RABBITMQ_DEFAULT_PASS}
      # --- LLM backends ---
      # Local GPU: on Linux use the Docker bridge gateway instead of
      # host.docker.internal (which only works on Mac/Win natively).
      # The setup scripts set OLLAMA_LOCAL_URL automatically per platform.
      - OLLAMA_LOCAL_URL=${OLLAMA_LOCAL_URL:-http://host.docker.internal:11434}
      # LAN GPU server (optional)
      - OLLAMA_REMOTE_URL=${OLLAMA_REMOTE_URL:-}
      # Preferred local Ollama model
      - LOCAL_MODEL=${LOCAL_MODEL:-llama3}
      # Claude API (optional – leave blank to use local only)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      # --- Vault mount path inside container ---
      - VAULT_MOUNT=/vault

  # ---------------------------------------------------------------------------
  # Worker agents
  # ---------------------------------------------------------------------------
  worker_agent:
    build: ./worker_agent
    depends_on:
      - message_queue
      - database
    deploy:
      replicas: 3
    networks:
      - backend_net
    environment:
      - DB_HOST=database
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - RABBITMQ_HOST=message_queue
      - RABBITMQ_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_PASS=${RABBITMQ_DEFAULT_PASS}

  # ---------------------------------------------------------------------------
  # Database (PostgreSQL)
  # ---------------------------------------------------------------------------
  database:
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./orchestrator/migrations:/docker-entrypoint-initdb.d/migrations
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Message queue (RabbitMQ)
  # ---------------------------------------------------------------------------
  message_queue:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Monitoring (Prometheus + Grafana)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    ports:
      - "9090:9090"
    networks:
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 3

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - backend_net
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_BASIC_ENABLED=true
      - GF_SECURITY_ALLOW_EMBEDDING=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  node-exporter:
    image: prom/node-exporter
    restart: unless-stopped
    expose:
      - 9100
    networks:
      - backend_net

networks:
  frontend_net:
  backend_net:
  ollama_net:
    driver: bridge

volumes:
  db_data:
  grafana_data:
  prometheus_data:
